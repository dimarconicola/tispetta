[build]
builder = "RAILPACK"
buildCommand = "pip install -e services/api -e services/worker"
watchPatterns = ["services/api/**", "services/worker/**", "apps/web/package.json", "pnpm-lock.yaml", ".env.example", "README.md"]

[deploy]
startCommand = "python -m worker.main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
