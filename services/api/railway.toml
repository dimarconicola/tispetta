[build]
builder = "DOCKERFILE"
dockerfilePath = "services/api/Dockerfile"
watchPatterns = ["services/api/**", "apps/web/package.json", "pnpm-lock.yaml", ".env.example", "README.md"]

[deploy]
preDeployCommand = "cd services/api && python -m app.predeploy"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
