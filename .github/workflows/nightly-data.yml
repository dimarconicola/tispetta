name: Nightly Data Checks

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  nightly-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3
      - uses: actions/setup-node@v5
        with:
          node-version: 20.19.0
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pnpm install --frozen-lockfile
      - run: python3 -m pip install -e services/api
      - run: python3 qa/scripts/check_data_integrity.py --reseed
      - run: python3 qa/scripts/check_data_freshness.py --reseed
      - run: python3 qa/scripts/check_link_health.py --reseed --sample-size 25
