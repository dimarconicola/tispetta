[build]
builder = "RAILPACK"
buildCommand = "pip install -e services/api"
watchPatterns = ["services/api/**", "apps/web/package.json", "pnpm-lock.yaml", ".env.example", "README.md"]

[deploy]
preDeployCommand = "cd services/api && python -m app.predeploy"
startCommand = "cd services/api && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
